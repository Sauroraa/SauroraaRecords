map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

server {
  listen 80;
  server_name music.sauroraarecords.be;

  client_max_body_size 3G;
  proxy_read_timeout 120s;
  proxy_connect_timeout 30s;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
  gzip_min_length 1024;

  location /api/ {
    proxy_pass http://api:4000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location = /internal/stream-auth {
    internal;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://api:4000/api/stream/verify?token=$arg_token&releaseId=$release_id&scope=$scope;
  }

  location ~ ^/hls/(?<release_id>[^/]+)/(?<scope>preview|full)/(?<hls_file>.+)$ {
    if ($arg_token = "") { return 401; }

    auth_request /internal/stream-auth;
    auth_request_set $auth_status $upstream_status;

    alias /data/uploads/streams/$release_id/$scope/$hls_file;
    add_header Cache-Control "private, no-store";
    add_header X-Stream-Auth $auth_status always;
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "*";
  }

  location /uploads/ {
    alias /data/uploads/;
    try_files $uri =404;
    add_header Cache-Control "private, max-age=0, no-store";
  }

  location /_next/static/ {
    proxy_pass http://records-web:3000/_next/static/;
    proxy_cache_valid 200 1h;
    add_header Cache-Control "public, max-age=3600, immutable";
  }

  location / {
    proxy_pass http://music-web:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

