server {
  listen 80;
  server_name sauroraarecords.be www.sauroraarecords.be;
  return 301 https://sauroraarecords.be$request_uri;
}

server {
  listen 443 ssl http2;
  server_name sauroraarecords.be www.sauroraarecords.be;

  ssl_certificate /etc/letsencrypt/live/sauroraarecords.be/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/sauroraarecords.be/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  client_max_body_size 3G;

  location / {
    proxy_pass http://127.0.0.1:3100;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
