services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - music-web
      - backend
    ports:
      - "127.0.0.1:3100:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/data/uploads:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_BASE=/api
      - INTERNAL_API_BASE=http://backend:4000/api
      - API_BASE=http://backend:4000/api
    restart: unless-stopped

  music-web:
    build:
      context: ./music-web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_BASE=http://backend:4000/api
      - RECORDS_BASE=${RECORDS_BASE:-http://localhost:3100}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - STORAGE_MODE=${STORAGE_MODE:-local}
      - LOCAL_STORAGE_PATH=/data/uploads
    depends_on:
      - mariadb
      - redis
      - meilisearch
    restart: unless-stopped
    volumes:
      - uploads_data:/data/uploads

  worker:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - WORKER_QUEUE_NAME=${WORKER_QUEUE_NAME:-audio:processing}
      - WORKER_OUTPUT_ROOT=/data/uploads/streams
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - uploads_data:/data/uploads

  mariadb:
    image: mariadb:11
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY:-change_me_meili_master_key}
      - MEILI_ENV=development
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  cron-service:
    build:
      context: ./cron-service
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      - COMMISSION_RATE=${COMMISSION_RATE}
    depends_on:
      - mariadb
    restart: unless-stopped

  adminer:
    image: adminer:4
    depends_on:
      - mariadb
    ports:
      - "8080:8080"
    restart: unless-stopped
    profiles:
      - tools

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    restart: unless-stopped
    profiles:
      - storage

volumes:
  db_data:
  uploads_data:
  meili_data:
  minio_data:
