services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - records-web
      - music-web
      - api
    ports:
      - "127.0.0.1:3100:80"
    volumes:
      - ./nginx/gateway.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/data/uploads:ro
    restart: unless-stopped

  records-web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_BASE=/api
      - INTERNAL_API_BASE=http://api:4000/api
      - API_BASE=http://api:4000/api
    restart: unless-stopped

  music-web:
    build:
      context: ./music-web
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3001
      - API_BASE=http://api:4000/api
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      - REDIS_URL=redis://redis:6379
      - MEILISEARCH_URL=http://meilisearch:7700
      - STORAGE_MODE=${STORAGE_MODE:-s3}
      - LOCAL_STORAGE_PATH=/data/uploads
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=${S3_REGION:-us-east-1}
      - S3_BUCKET=${S3_BUCKET:-sauroraa}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minio123}
      - S3_FORCE_PATH_STYLE=true
      - STREAM_TOKEN_TTL_SECONDS=30
    depends_on:
      - mariadb
      - redis
      - meilisearch
    restart: unless-stopped
    volumes:
      - uploads_data:/data/uploads

  worker:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - WORKER_QUEUE_NAME=audio:processing
      - WORKER_OUTPUT_ROOT=/data/uploads/streams
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - uploads_data:/data/uploads

  cron:
    build:
      context: ./cron-service
      dockerfile: Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@mariadb:3306/${MARIADB_DATABASE}
      - COMMISSION_RATE=${COMMISSION_RATE}
    depends_on:
      - mariadb
    restart: unless-stopped

  mariadb:
    image: mariadb:11
    command: --innodb-buffer-pool-size=1G --max-connections=300
    environment:
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    environment:
      - MEILI_MASTER_KEY=${MEILISEARCH_MASTER_KEY}
      - MEILI_ENV=production
      - MEILI_HTTP_PAYLOAD_SIZE_LIMIT=100MB
    volumes:
      - meili_data:/meili_data
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:9001:9001"

volumes:
  db_data:
  redis_data:
  meili_data:
  uploads_data:
  minio_data:
